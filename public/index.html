  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet" />

  <!-- <link rel="icon" type="image/x-icon" href="/favicon.ico" /> -->
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <script>
    // No service worker in production. It previously cached the app shell and
    // collided with another app on the same origin, serving stale data.
    // Proactively unregister any worker left on a returning visitor's device
    // and purge its Cache Storage so the app always loads fresh from network.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((regs) => regs.forEach((r) => r.unregister()))
        .catch(() => {});
    }
    if (window.caches && caches.keys) {
      caches.keys()
        .then((keys) => keys.forEach((k) => caches.delete(k)))
        .catch(() => {});
    }
  </script>
</body>

</html>
